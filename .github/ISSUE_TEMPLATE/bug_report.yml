name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal Reproduction
      description: A few lines against `@ecsia/kit` that reproduce the bug — the single most helpful thing you can include.
      render: ts
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened (include any error message or stack trace)
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Information about your environment
      placeholder: |
        Runtime: [e.g. Node 22.13, Bun 1.1, Deno 2.0, Chrome 130]
        OS: [e.g. macOS 14, Ubuntu 22.04, Windows 11]
        ecsia version: [e.g. @ecsia/kit 0.1.0]
        Single-threaded or threaded: [e.g. threaded: true]
    validations:
      required: false
