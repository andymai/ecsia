# Weekly dependency updates. Dev-dep minors/patches arrive grouped as one PR; majors
# get individual PRs so each carries its own evaluation. Runtime deps are few and
# workspace-internal — anything external that appears later gets a PR per update.
#
# `cooldown` holds proposals back until a release has aged, so a fresh malicious
# upload (the npm supply-chain attack pattern) isn't suggested the moment it lands.
version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
      semver-major-days: 14
    groups:
      dev-minor-patch:
        applies-to: version-updates
        dependency-type: development
        update-types:
          - minor
          - patch
    ignore:
      # engines pin node >=22.13 — types track the minimum supported runtime, not latest
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: chore
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    cooldown:
      default-days: 7
    commit-message:
      prefix: ci
