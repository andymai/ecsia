name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Node >=22.13 (engines) for resizable SharedArrayBuffer + Atomics.waitAsync.
        node: [22, 24]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build (tsc -b, all packages)
        run: pnpm build

      - name: Type-check examples + bench
        run: pnpm typecheck:extras

      - name: Type-check package tests
        run: pnpm typecheck:tests

      - name: Type-check documentation snippets
        run: pnpm docs:check

      - name: Test (unit + property + worker + type-level, coverage-gated)
        run: pnpm test -- --coverage

      - name: Bundle-size budget (tree-shaken min+gzip)
        run: pnpm size

  # ---------------------------------------------------------------------------
  # Bench regression lane: a dedicated job (noise-isolated from unit CI) asserting each ecsia
  # iteration path stays under its committed ns/entity RATIO vs a same-run bitECS control. The ratio
  # cancels shared-runner drift, so a failure is a real regression, not scheduling noise. Single Node
  # version (timing, not correctness — that's build-test's job).
  # ---------------------------------------------------------------------------
  bench-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Bench regression (ratios vs bitECS control)
        env:
          BENCH_REGRESSION: '1'
        run: pnpm vitest run --project bench bench/test/regression.bench.test.ts

  # ---------------------------------------------------------------------------
  # Runtime lanes (P3): prove the SHIPPED dist actually runs on each claimed runtime.
  # Each lane builds first (the smoke imports packages/ecsia/dist), then runs the SAME
  # scripts/runtime-smoke.mjs — node, bun, deno — plus a browser lane via Playwright.
  # ---------------------------------------------------------------------------

  node-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (tsc -b, all packages)
        run: pnpm build
      - name: Runtime smoke (Node — incl real worker_threads pool round-trip)
        run: node scripts/runtime-smoke.mjs

  bun-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.14"
      - run: pnpm install --frozen-lockfile
      - name: Build (tsc -b, all packages)
        run: pnpm build
      - name: Runtime smoke (Bun — core paths; pool section may skip)
        run: bun scripts/runtime-smoke.mjs

  deno-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: "2.8.2"
      - run: pnpm install --frozen-lockfile
      - name: Build (tsc -b, all packages)
        run: pnpm build
      - name: Runtime smoke (Deno — core paths; pool section skips by design)
        run: deno run --allow-read scripts/runtime-smoke.mjs

  browser-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (tsc -b, all packages)
        run: pnpm build
      - name: Bundle the browser smoke (esbuild)
        run: pnpm smoke:browser:bundle
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Browser smoke (isolated + non-isolated variants)
        run: pnpm smoke:browser
