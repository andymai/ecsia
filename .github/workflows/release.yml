name: Release

on:
  push:
    branches: [main]
  # Recovery path: a release can be tagged but never published if the publish
  # job fails mid-flight. Dispatching with `republish` re-runs publish only;
  # `pnpm -r publish` skips versions already on the registry, so it's safe.
  workflow_dispatch:
    inputs:
      republish:
        description: "Republish current main versions to npm (skips release-please)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'push'
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      # PRs created with the default GITHUB_TOKEN don't trigger workflows
      # (GitHub anti-loop protection), so the release PR would never see CI
      # and auto-merge would never fire. The release-kun App token avoids this.
      - name: Mint release-kun App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.RELEASE_KUN_APP_ID }}
          private-key: ${{ secrets.RELEASE_KUN_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      - name: Auto-merge release PR
        if: steps.release.outputs.pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # Guard fromJSON: when no release PR is created the output is empty and
          # fromJSON('') errors at template-eval time even though `if:` skips the step.
          PR_NUMBER: ${{ steps.release.outputs.pr && fromJSON(steps.release.outputs.pr).number || '' }}
        # `gh pr merge --auto` enables auto-merge, but GitHub rejects the call
        # (`Pull request is in unstable status`) in the brief window before the
        # PR's required checks register. Retry until they settle.
        run: |
          for attempt in $(seq 1 6); do
            if gh pr merge "$PR_NUMBER" --auto --squash --repo "$GITHUB_REPOSITORY"; then
              echo "Auto-merge enabled on attempt $attempt."
              exit 0
            fi
            if [ "$attempt" -lt 6 ]; then
              echo "Attempt $attempt failed to enable auto-merge; retrying in 10s..."
              sleep 10
            fi
          done
          echo "::error::Failed to enable auto-merge on PR #$PR_NUMBER after 6 attempts."
          exit 1

  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [release-please]
    # `always() && !cancelled()` lets this evaluate when release-please is
    # skipped (workflow_dispatch republish path).
    if: |
      always() && !cancelled() &&
      (needs.release-please.outputs.releases_created == 'true' ||
       (github.event_name == 'workflow_dispatch' && inputs.republish == true))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # Authenticates via npm OIDC trusted publishers (configured per package on
      # npmjs.com for this exact workflow filename); provenance is automatic.
      # Published per-package rather than via `pnpm -r publish` so one package
      # without a trusted publisher can't abort the run and silently strand every
      # package after it — each is attempted, and the job fails at the end if any did.
      - name: Publish to npm
        shell: bash
        run: |
          set -uo pipefail
          failed=()
          for pj in packages/*/package.json; do
            if ! meta=$(node -p "const p=require('./$pj'); [p.name, p.version, !!p.private].join(' ')"); then
              echo "::error::Could not read $pj"
              failed+=("$pj")
              continue
            fi
            read -r name version private <<<"$meta"
            if [ "$private" = "true" ]; then
              echo "↷ $name is private; skipping"
              continue
            fi
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "↷ $name@$version already on registry; skipping"
              continue
            fi
            echo "📦 Publishing $name@$version"
            if ! pnpm --filter "$name" publish --access public --no-git-checks; then
              echo "::error::Failed to publish $name@$version"
              failed+=("$name@$version")
            fi
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::Publish failed for: ${failed[*]}"
            exit 1
          fi
          echo "All publishable packages are on the registry."
